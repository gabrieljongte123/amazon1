# SAM CLI deployment configuration for IntentFlow
# Usage: sam deploy (uses these defaults automatically)

version = 0.1

[default.deploy.parameters]
stack_name = "intentflow"
resolve_s3 = true
s3_prefix = "intentflow"
region = "us-east-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
parameter_overrides = "Environment=\"prod\" BedrockModelId=\"anthropic.claude-3-sonnet-20240229-v1:0\" BedrockRegion=\"us-east-1\" ConfidenceThreshold=\"0.8\" MaxQuestions=\"5\""
disable_rollback = false
image_repositories = []

[default.build.parameters]
use_container = false
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.global.parameters]
region = "us-east-1"
