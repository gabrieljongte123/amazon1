AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  IntentFlow - AI-driven conversational commerce backend for Amazon Now.
  Serverless architecture using Lambda, DynamoDB, API Gateway, S3, and CloudFront.

# ============================================================================
# Parameters
# ============================================================================
Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-sonnet-20240229-v1:0
    Description: Amazon Bedrock model ID for NLU

  BedrockRegion:
    Type: String
    Default: us-east-1
    Description: AWS region where Bedrock model is available

  ConfidenceThreshold:
    Type: String
    Default: "0.8"
    Description: Confidence score threshold to trigger recommendations

  MaxQuestions:
    Type: String
    Default: "5"
    Description: Maximum questions the engine will ask per session

# ============================================================================
# Global settings for all Lambda functions
# ============================================================================
Globals:
  Function:
    Timeout: 29
    MemorySize: 512
    Runtime: python3.12
    Architectures:
      - x86_64

# ============================================================================
# Resources
# ============================================================================
Resources:

  # --------------------------------------------------------------------------
  # DynamoDB Table — Session Store
  # --------------------------------------------------------------------------
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: intentflow-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # --------------------------------------------------------------------------
  # Lambda Function — IntentFlow API (FastAPI + Mangum)
  # --------------------------------------------------------------------------
  IntentFlowApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: intentflow-api
      Handler: main.handler
      CodeUri: ../backend/
      Description: IntentFlow FastAPI backend served via Mangum adapter
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          BEDROCK_REGION: !Ref BedrockRegion
          CONFIDENCE_THRESHOLD: !Ref ConfidenceThreshold
          MAX_QUESTIONS: !Ref MaxQuestions
          USE_LOCAL_STORE: "false"
      Policies:
        # DynamoDB read/write access to sessions table
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        # Amazon Bedrock invoke access
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: !Sub "arn:aws:bedrock:${BedrockRegion}::foundation-model/${BedrockModelId}"
        # S3 read access for product catalog
        - S3ReadPolicy:
            BucketName: !Ref ProductCatalogBucket
      Events:
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref IntentFlowApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref IntentFlowApi
            Path: /
            Method: ANY

  # --------------------------------------------------------------------------
  # API Gateway — REST API
  # --------------------------------------------------------------------------
  IntentFlowApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: intentflow-api
      StageName: prod
      Description: IntentFlow REST API with CORS support
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-User-Id,X-Correlation-Id,Authorization'"
        AllowOrigin: "'*'"
        MaxAge: "'86400'"

  # --------------------------------------------------------------------------
  # S3 Bucket — Frontend Hosting (served via CloudFront OAC)
  # --------------------------------------------------------------------------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "intentflow-frontend-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Bucket policy allowing CloudFront OAC to read objects
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # --------------------------------------------------------------------------
  # CloudFront Origin Access Control
  # --------------------------------------------------------------------------
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: intentflow-frontend-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # --------------------------------------------------------------------------
  # CloudFront Distribution — Frontend CDN
  # --------------------------------------------------------------------------
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: IntentFlow frontend distribution
        Origins:
          - Id: S3FrontendOrigin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3FrontendOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          DefaultTTL: 86400
          MaxTTL: 31536000
          MinTTL: 0
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          Compress: true
        # SPA routing — redirect 403/404 to index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        PriceClass: PriceClass_100
        HttpVersion: http2

  # --------------------------------------------------------------------------
  # S3 Bucket — Product Catalog
  # --------------------------------------------------------------------------
  ProductCatalogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "intentflow-catalog-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # --------------------------------------------------------------------------
  # CloudWatch Log Group — Lambda logs
  # --------------------------------------------------------------------------
  IntentFlowApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/intentflow-api
      RetentionInDays: 14

# ============================================================================
# Outputs
# ============================================================================
Outputs:
  ApiEndpoint:
    Description: IntentFlow API Gateway endpoint URL
    Value: !Sub "https://${IntentFlowApi}.execute-api.${AWS::Region}.amazonaws.com/prod/"

  CloudFrontUrl:
    Description: CloudFront distribution URL for the frontend
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  SessionsTableName:
    Description: DynamoDB sessions table name
    Value: !Ref SessionsTable

  FrontendBucketName:
    Description: S3 bucket for frontend static assets
    Value: !Ref FrontendBucket

  ProductCatalogBucketName:
    Description: S3 bucket for product catalog data
    Value: !Ref ProductCatalogBucket

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref CloudFrontDistribution
